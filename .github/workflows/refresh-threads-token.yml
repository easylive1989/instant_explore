name: Refresh Threads Token

on:
  schedule:
    # 每月 1 號 03:00 UTC（台灣時間 11:00）refresh long-lived Threads token。
    # Threads token 有效期 60 天，月排程提供 ~30 天緩衝。
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  refresh-threads-token:
    name: Refresh Threads long-lived token on VPS
    runs-on: ubuntu-latest
    steps:
      - name: Refresh token via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/lorescape
            # Pull the latest meta_token_helper.py. backend/.env is gitignored
            # so reset --hard does not touch the running token.
            git fetch --prune origin master
            git reset --hard origin/master

            # Extract the current token without exporting every var in .env.
            CURRENT_TOKEN=$(grep '^THREADS_ACCESS_TOKEN=' backend/.env \
              | head -n1 | cut -d= -f2-)
            if [ -z "$CURRENT_TOKEN" ]; then
              echo "::error::THREADS_ACCESS_TOKEN missing from backend/.env"
              exit 1
            fi

            THREADS_ACCESS_TOKEN="$CURRENT_TOKEN" python3 \
              scripts/meta_token_helper.py \
              --platform threads --refresh \
              --write-env backend/.env

            # Restart backend so the FastAPI process picks up the new token.
            cd backend
            docker compose restart api
            echo "Threads token refreshed and backend restarted."
