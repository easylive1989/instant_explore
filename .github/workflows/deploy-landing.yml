name: Deploy Landing

# Landing is a static marketing site deployed independently of the app /
# backend / DB pipeline (see deploy.yml). Manual trigger only.
on:
  workflow_dispatch:

jobs:
  deploy-landing:
    name: Deploy Landing to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        # Retry transient registry failures (ECONNRESET / network aborted)
        # instead of failing the whole deploy on a single flaky download.
        run: >-
          npm ci --no-audit --no-fund
          --fetch-retries=5
          --fetch-retry-mintimeout=20000
          --fetch-retry-maxtimeout=120000

      - name: Build landing
        working-directory: landing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INSTANT_EXPLORE_7B442 }}
          channelId: live
          projectId: instant-explore-7b442
