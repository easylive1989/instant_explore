name: Deploy Landing

# Landing is a static marketing site deployed independently of the app /
# backend / DB pipeline (see deploy.yml).
#
# The daily-story share pages (/[locale]/story/[date]) are statically
# generated at build time from Supabase, so the site must be rebuilt after a
# new story is published or that day's shared link 404s. `schedule` rebuilds
# every 3 hours (UTC) as a freshness baseline; trigger `workflow_dispatch`
# manually right after publishing for an immediate refresh.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

jobs:
  deploy-landing:
    name: Deploy Landing to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: landing/package-lock.json

      - name: Install dependencies
        working-directory: landing
        # Retry transient registry failures (ECONNRESET / network aborted)
        # instead of failing the whole deploy on a single flaky download.
        run: >-
          npm ci --no-audit --no-fund
          --fetch-retries=5
          --fetch-retry-mintimeout=20000
          --fetch-retry-maxtimeout=120000

      - name: Build landing
        working-directory: landing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_INSTANT_EXPLORE_7B442 }}
          channelId: live
          projectId: instant-explore-7b442
