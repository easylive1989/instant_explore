services:
  api:
    build: .
    image: lorescape-backend:latest
    container_name: lorescape-backend
    restart: unless-stopped
    # Bind only to host loopback; Caddy on the host fronts public traffic
    # (api.lorescape.app → 127.0.0.1:8001 → container :8000). Picking 8001
    # because 8000 is already taken by another project on this VPS.
    ports:
      - "127.0.0.1:8001:8000"
    env_file: .env
    # Vertex AI service-account key, mounted read-only. Only used when
    # GEMINI_BACKEND=vertex; the .env must point GOOGLE_APPLICATION_CREDENTIALS
    # at the CONTAINER path (/app/service-account.json), not the host path.
    # The file itself lives on the VPS (gitignored); provide it out-of-band.
    volumes:
      - ./service-account.json:/app/service-account.json:ro
    # Healthcheck via the /health endpoint (runs inside the container).
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Social publisher: 21:00 carousel + 21:10/23:10 reel jobs, decoupled from
  # the API server. Reuses the api image (built above by `--build`).
  publisher:
    image: lorescape-backend:latest
    container_name: lorescape-publisher
    restart: unless-stopped
    command: ["python", "-m", "lorescape_backend.social.publisher_daemon"]
    env_file: .env
    environment:
      # Container path of the volume below; the reel job reads
      # <DAILY_VIDEO_DIR>/<date>/final.mp4 + narration.txt, rsynced from the
      # operator's machine by scripts/upload_reel_to_vps.sh.
      DAILY_VIDEO_DIR: /media/daily_video
    volumes:
      - /opt/lorescape-media/daily_video:/media/daily_video:ro
    depends_on:
      - api
